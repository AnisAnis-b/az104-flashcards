<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-104 · Cartes de révision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="description" content="168 cartes de révision gratuites pour la certification Microsoft AZ-104 (Azure Administrator) : pièges d'examen, rappel actif, progression sauvegardée, utilisable hors ligne.">
<meta name="theme-color" content="#0e1016">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
  :root{
    --bg:#0e1016;
    --bg2:#141824;
    --panel:#191d2a;
    --line:#272c3d;
    --line-2:#232838;
    --ink:#e8eaf2;
    --muted:#8b91a6;
    --muted-2:#5f6577;
    --accent:#60a5fa;
    --gov:#a78bfa;
    --sto:#2dd4bf;
    --com:#fbbf24;
    --net:#60a5fa;
    --mon:#fb7185;
    --tip:#4ade80;
    --pie:#fb923c;
    --geo:#e879f9;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(96,165,250,.08), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(167,139,250,.07), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:22px 18px 60px;}

  /* ---------- Header ---------- */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
  .brand{display:flex;flex-direction:column;gap:2px;}
  .brand .kicker{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted-2);}
  .brand h1{
    font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:26px;margin:0;letter-spacing:-.01em;
    line-height:1.05;
  }
  .brand h1 b{color:var(--accent);font-weight:700;transition:color .3s ease;}
  .stats{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);text-align:right;line-height:1.7;white-space:nowrap;}
  .stats .k{color:var(--ink);}
  .stats .ok{color:var(--tip);}
  .stats .rv{color:var(--com);}

  /* ---------- Progress ---------- */
  .rail{height:6px;border-radius:99px;background:var(--line);overflow:hidden;margin:2px 0 14px;}
  .rail>span{display:block;height:100%;width:0;background:var(--accent);border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1),background .3s ease;}

  /* ---------- Filters ---------- */
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .chip{
    font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:500;
    padding:7px 12px;border-radius:99px;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);color:var(--muted);
    transition:all .18s ease;user-select:none;
  }
  .chip:hover{border-color:var(--muted-2);color:var(--ink);}
  .chip.active{color:#0e1016;background:var(--accent);border-color:var(--accent);}
  .chip .dot{display:inline-block;width:7px;height:7px;border-radius:99px;margin-right:6px;vertical-align:middle;}
  .chip.review-toggle{margin-left:auto;}
  .chip.review-toggle.active{background:var(--com);border-color:var(--com);}

  /* ---------- Card ---------- */
  .stage{perspective:1600px;margin:16px 0 10px;}
  .card{
    position:relative;width:100%;min-height:320px;cursor:pointer;outline:none;
    --accent:var(--net);
    user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  }
  .card-inner{
    position:relative;width:100%;min-height:320px;
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.35,.1,.25,1);
  }
  .card.flipped .card-inner{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border:1px solid var(--line);border-radius:var(--radius);
    background:linear-gradient(160deg,var(--panel),var(--bg2));
    padding:26px 24px;display:flex;flex-direction:column;
    box-shadow:0 20px 50px -30px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.03);
    overflow:auto;
  }
  .face::before{
    content:"";position:absolute;left:0;top:0;height:100%;width:4px;
    background:var(--accent);opacity:.9;transition:background .3s ease;
  }
  .face.back{transform:rotateY(180deg);}
  .face.back{background:linear-gradient(160deg,#181f2e,#111623);}

  .meta{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:auto;}
  .eyebrow{
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;
    color:var(--accent);font-weight:600;transition:color .3s ease;display:flex;align-items:center;gap:8px;
  }
  .eyebrow .num{color:var(--muted-2);}
  .flag{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    padding:3px 8px;border-radius:99px;border:1px solid var(--line);color:var(--muted);}
  .flag.known{color:var(--tip);border-color:rgba(74,222,128,.4);}
  .flag.review{color:var(--com);border-color:rgba(251,191,36,.4);}

  .qlabel{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-2);margin:0 0 10px;}
  .qtext{
    font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:22px;line-height:1.32;margin:0;
    letter-spacing:-.01em;
  }
  .atext{font-size:17px;line-height:1.55;margin:0;color:#eef0f7;}
  .atext code{font-family:"JetBrains Mono",monospace;font-size:.9em;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:6px;color:#cfe0ff;}
  .hint{
    margin-top:auto;padding-top:16px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted-2);
    display:flex;align-items:center;gap:8px;
  }
  .hint kbd{background:var(--line);border:1px solid var(--line-2);border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--muted);font-family:inherit;font-size:10px;}

  /* ---------- Controls ---------- */
  .nav{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .btn{
    font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:500;
    border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    padding:12px 14px;cursor:pointer;transition:all .16s ease;display:flex;align-items:center;justify-content:center;gap:7px;
    user-select:none;
  }
  .btn:hover{border-color:var(--muted-2);background:#1e2333;}
  .btn:active{transform:translateY(1px);}
  .btn.icon{width:48px;flex:0 0 auto;font-size:16px;}
  .btn.flip{flex:1;background:var(--accent);border-color:var(--accent);color:#0e1016;font-weight:600;transition:background .3s ease,transform .16s ease;}
  .btn.flip:hover{filter:brightness(1.06);}
  .actions{display:flex;gap:10px;margin-top:10px;}
  .btn.rev{flex:1;color:var(--com);border-color:rgba(251,191,36,.3);}
  .btn.rev:hover{background:rgba(251,191,36,.08);}
  .btn.know{flex:1;color:var(--tip);border-color:rgba(74,222,128,.3);}
  .btn.know:hover{background:rgba(74,222,128,.08);}
  .tools{display:flex;gap:10px;margin-top:10px;}
  .btn.ghost{flex:1;color:var(--muted);font-size:12px;padding:10px;}

  .empty{
    text-align:center;padding:60px 20px;color:var(--muted);
    font-family:"JetBrains Mono",monospace;font-size:13px;line-height:1.8;
  }
  .empty b{color:var(--ink);font-weight:600;}

  footer{margin-top:22px;text-align:center;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted-2);line-height:1.7;}

  @media (max-width:520px){
    .wrap{padding:18px 14px 48px;}
    .brand h1{font-size:22px;}
    .qtext{font-size:20px;}
    .stats{font-size:11px;}
    .hint{display:none;}
    .face{padding:22px 18px;}
  }
  @media (prefers-reduced-motion:reduce){
    .card-inner{transition:none;}
    .rail>span{transition:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="kicker">Microsoft Azure Administrator</span>
      <h1>AZ&#8209;104 <b id="brandAccent">· Cartes</b></h1>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="rail"><span id="railFill"></span></div>

  <div class="filters" id="filters"></div>

  <div class="stage">
    <div class="card" id="card" tabindex="0" role="button" aria-label="Carte de révision, cliquer pour retourner">
      <div class="card-inner">
        <div class="face front">
          <div class="meta">
            <span class="eyebrow" id="feyebrow"></span>
            <span class="flag" id="fflag"></span>
          </div>
          <p class="qlabel">Question</p>
          <p class="qtext" id="qtext"></p>
          <div class="hint"><kbd>Espace</kbd> retourner · <kbd>←</kbd> <kbd>→</kbd> naviguer</div>
        </div>
        <div class="face back">
          <div class="meta">
            <span class="eyebrow" id="beyebrow"></span>
            <span class="flag" id="bflag"></span>
          </div>
          <p class="qlabel">Réponse</p>
          <p class="atext" id="atext"></p>
          <div class="hint"><kbd>J</kbd> je sais · <kbd>R</kbd> à revoir · <kbd>S</kbd> mélanger</div>
        </div>
      </div>
    </div>
    <div class="empty" id="empty" style="display:none"></div>
  </div>

  <div class="nav" id="nav">
    <button class="btn icon" id="prev" aria-label="Précédent">◀</button>
    <button class="btn flip" id="flip">Retourner</button>

  </div>
  <div class="actions" id="actions">
    <button class="btn rev" id="markRev">À revoir</button>
    <button class="btn know" id="markKnow">Je sais</button>
  </div>
  <div class="tools">
    <button class="btn ghost" id="shuffle">↺ Mélanger</button>
    <button class="btn ghost" id="reset">Réinitialiser</button>
  </div>

  <footer id="foot">
    168 cartes · pièges d'examen &amp; astuces inclus<br>
    Progression sauvegardée sur cet appareil.<br>
    <a href="index.html" style="color:var(--muted-2)">À propos, code source &amp; contributions</a>
  </footer>
</div>

<script>
/* ---------- Données ---------- */
const DOMAINS = {
  gov:{label:"Identités & Gouvernance", short:"Gouvernance", color:"var(--gov)"},
  sto:{label:"Stockage",                short:"Stockage",    color:"var(--sto)"},
  com:{label:"Compute",                 short:"Compute",     color:"var(--com)"},
  net:{label:"Réseau",                  short:"Réseau",      color:"var(--net)"},
  mon:{label:"Monitoring & Maintenance",short:"Monitoring",  color:"var(--mon)"},
  pie:{label:"Pièges d'examen",         short:"Pièges",      color:"var(--pie)"},
  geo:{label:"Global vs Régional",      short:"Portée",      color:"var(--geo)"},
  tip:{label:"Astuces exam",            short:"Astuces",     color:"var(--tip)"},
};

const CARDS = [
  // ===== D1 Identités & Gouvernance =====
  {d:"gov", q:"Différence entre un compte <b>Member</b> et un <b>Guest</b> dans Entra ID ?", a:"Member = utilisateur interne du tenant. Guest = invité B2B externe."},
  {d:"gov", q:"Comment créer / inviter / supprimer beaucoup d'utilisateurs d'un coup ?", a:"Bulk operations via fichier <code>CSV</code> (bulk create / invite / delete)."},
  {d:"gov", q:"Security group vs Microsoft 365 group ?", a:"Security = gérer l'accès aux ressources. M365 = collaboration (Teams, boîte partagée…)."},
  {d:"gov", q:"Appartenance de groupe <b>Assigned</b> vs <b>Dynamic</b> ?", a:"Assigned = ajout manuel. Dynamic = règle d'appartenance automatique (automatisation)."},
  {d:"gov", q:"La licence de groupe s'applique à qui ?", a:"Aux membres uniquement. Un propriétaire seul ne consomme pas de licence."},
  {d:"gov", q:"Le SSPR s'applique-t-il aux invités ?", a:"Non — le SSPR ne couvre pas les invités."},
  {d:"gov", q:"Quelle est la condition du <b>password writeback</b> ?", a:"Environnement hybride uniquement (réécrit le mot de passe vers l'AD on-prem)."},
  {d:"gov", q:"À quoi servent les <b>Administrative Units (AU)</b> ?", a:"Déléguer l'administration sur un sous-ensemble d'utilisateurs / groupes."},
  {d:"gov", q:"Rôle d'<b>Entra Connect / Cloud Sync</b> ?", a:"Synchroniser l'AD on-prem vers Entra ID (identité hybride)."},
  {d:"gov", q:"Que débloque la licence Entra <b>P1</b> ?", a:"Conditional Access, dynamic groups, SSPR writeback hybride, group-based licensing."},
  {d:"gov", q:"Que débloque la licence Entra <b>P2</b> ?", a:"PIM, Identity Protection, Access Reviews."},
  {d:"gov", q:"Où définit-on qui peut inviter des invités B2B ?", a:"External collaboration settings."},
  {d:"gov", q:"Configurer la relation avec un tenant précis ?", a:"Cross-tenant access settings."},
  {d:"gov", q:"Les 3 rôles RBAC de base ?", a:"Reader (lire), Contributor (gérer), Owner (gérer + gérer les accès)."},
  {d:"gov", q:"Quel rôle gère les accès sans gérer les ressources ?", a:"User Access Administrator."},
  {d:"gov", q:"Ordre d'héritage du scope RBAC ?", a:"Management Group → Subscription → Resource Group → Resource (hérite vers le bas)."},
  {d:"gov", q:"Composants d'un rôle personnalisé (JSON) ?", a:"<code>Actions</code> / <code>NotActions</code> / <code>DataActions</code> / <code>NotDataActions</code> / <code>AssignableScopes</code>."},
  {d:"gov", q:"<b>Actions</b> vs <b>DataActions</b> dans un rôle ?", a:"Actions = plan de contrôle (management). DataActions = plan de données (ex : lire un blob)."},
  {d:"gov", q:"Qu'est-ce qu'un <b>deny assignment</b> ?", a:"Un refus qui prime sur les role assignments (issu de Blueprints / Managed Apps)."},
  {d:"gov", q:"À quoi sert l'<b>ABAC</b> (conditions) ?", a:"Affiner un role assignment via une condition (ex : tag, nom de conteneur blob)."},
  {d:"gov", q:"<code>Get-AzRoleDefinition -Name</code> attend quoi ?", a:"Un nom de rôle, pas un ID."},
  {d:"gov", q:"Storage : Account Contributor vs Blob Data Contributor ?", a:"Account Contributor = gestion du compte + clés. Blob Data Contributor = accès aux données."},
  {d:"gov", q:"Pour accéder aux <b>données</b> Storage, quel type de rôle ?", a:"Un rôle « Data » (ex : Blob Data Contributor), pas Contributor classique."},
  {d:"gov", q:"Policy <b>definition</b> vs <b>initiative</b> ?", a:"Definition = une règle. Initiative (policy set) = groupe de définitions."},
  {d:"gov", q:"Les effets d'Azure Policy ?", a:"Deny, Audit, Append, Modify, DeployIfNotExists (DINE), AuditIfNotExists, Disabled."},
  {d:"gov", q:"À quoi sert une <b>remediation task</b> ?", a:"Corriger les ressources existantes. DINE / Modify nécessitent une identité managée."},
  {d:"gov", q:"Policy vs RBAC ?", a:"RBAC = qui peut faire quoi. Policy = ce que les ressources ont le droit d'être / avoir."},
  {d:"gov", q:"Rôle des <b>Management Groups</b> ?", a:"Hiérarchie au-dessus des subscriptions ; héritage de Policy et RBAC."},
  {d:"gov", q:"Ajouter département / coût / reporting à une ressource ?", a:"Tags (Tag Contributor pour gérer uniquement les tags)."},
  {d:"gov", q:"Les 2 types de locks et leur effet ?", a:"CanNotDelete (bloque la suppression), ReadOnly (bloque tout). Scope Sub/RG/Resource, héritent vers le bas."},
  {d:"gov", q:"Créer un budget + des alertes de coût ?", a:"Cost Management (rôle Cost Management Contributor)."},
  {d:"gov", q:"Qu'est-ce que le <b>Conditional Access</b> ?", a:"Accès conditionnel identité : signal → condition → grant/block (P1). ≠ accès temporaire Storage."},

  // ===== D2 Stockage =====
  {d:"sto", q:"À quoi sert un <b>SAS</b> ?", a:"Donner un accès temporaire et limité au stockage."},
  {d:"sto", q:"Les 3 types de SAS ?", a:"Account SAS, Service SAS, User delegation SAS (signé par Entra ID → recommandé)."},
  {d:"sto", q:"Révoquer / gérer un SAS côté serveur ?", a:"Stored access policy."},
  {d:"sto", q:"Portée des <b>access keys</b> ?", a:"Accès large au compte — à éviter pour un partenaire ; penser à la rotation."},
  {d:"sto", q:"Accéder au Storage <b>sans clés</b> ?", a:"Microsoft Entra ID + RBAC."},
  {d:"sto", q:"Les 3 modes de <b>Public Network Access</b> (PNA) ?", a:"All networks (ouvert), Selected networks (firewall actif), Disabled (Private Endpoint obligatoire)."},
  {d:"sto", q:"Private Endpoint vs Service Endpoint ?", a:"Private Endpoint = IP privée dans le VNet. Service Endpoint = IP publique mais via le backbone Azure."},
  {d:"sto", q:"Où gère-t-on soft delete, versioning, snapshots ?", a:"Data Protection."},
  {d:"sto", q:"Que fait une <b>immutability policy</b> ?", a:"WORM : empêche modification / suppression pendant une période définie."},
  {d:"sto", q:"Les options de redondance du stockage ?", a:"LRS, ZRS, GRS, RA-GRS, GZRS, RA-GZRS."},
  {d:"sto", q:"LRS vs ZRS ?", a:"LRS = 3 copies dans un datacenter. ZRS = réparti sur plusieurs zones de la même région."},
  {d:"sto", q:"GRS vs RA-GRS ?", a:"GRS = réplication vers une région secondaire. RA-GRS = GRS + lecture dans la secondaire."},
  {d:"sto", q:"Les 4 access tiers ?", a:"Hot (fréquent), Cool (peu), Cold (très peu), Archive (long terme, réhydratation)."},
  {d:"sto", q:"Déplacer <b>automatiquement</b> des blobs entre tiers ?", a:"Lifecycle management policy (règles auto après N jours)."},
  {d:"sto", q:"Protocole et port d'Azure Files ?", a:"SMB, port <code>445</code> (aussi NFS en Premium)."},
  {d:"sto", q:"À quoi sert <b>Azure File Sync</b> ?", a:"Agent + cloud tiering : garder les fichiers chauds on-prem, le reste dans le cloud."},
  {d:"sto", q:"Migrer un dossier complet vers Blob (récursif) ?", a:"<code>AzCopy copy --recursive</code>, ou <code>Get-ChildItem -Recurse</code> + <code>Set-AzStorageBlobContent</code>."},
  {d:"sto", q:"Qu'est-ce que l'<b>object replication</b> ?", a:"Répliquer des blobs vers un autre compte / région pour des workloads."},
  {d:"sto", q:"Stockage persistant pour <b>ACI</b> ?", a:"Azure File Share (ACI ne monte pas un Blob container comme volume)."},
  {d:"sto", q:"Qu'est-ce qu'un <b>snapshot</b> de blob ?", a:"Version ponctuelle (read-only) d'un blob à un instant T."},
  {d:"sto", q:"Le firewall du Storage bloque un service Microsoft (ex : Azure Backup) ?", a:"Cocher l'exception <b>« Allow trusted Microsoft services »</b> dans le firewall du compte."},

  // ===== D3 Compute =====
  {d:"com", q:"<b>Availability Set</b> : que protège-t-il, quel SLA ?", a:"Panne matériel local (fault + update domains). SLA 99,95 %."},
  {d:"com", q:"<b>Availability Zones</b> : que protègent-elles, quel SLA ?", a:"Panne d'un datacenter entier (datacenters séparés). SLA 99,99 %."},
  {d:"com", q:"Qu'est-ce qu'un <b>VMSS</b> ?", a:"VM identiques, scale auto selon métrique / planning, intégré au LB. Choix par défaut d'une web farm."},
  {d:"com", q:"Set vs Zones — distinction rapide ?", a:"Set = pannes matériel local. Zones = panne d'un datacenter entier."},
  {d:"com", q:"Les types de disques managés ?", a:"Standard HDD, Standard SSD, Premium SSD, Ultra Disk."},
  {d:"com", q:"<b>SSE</b> vs <b>ADE</b> ?", a:"SSE = chiffrement au repos par défaut (plateforme). ADE = BitLocker / dm-crypt dans l'OS."},
  {d:"com", q:"Qu'est-ce qu'un <b>ephemeral OS disk</b> ?", a:"Disque OS non persistant (perf, pas de coût de stockage)."},
  {d:"com", q:"Que fait <b>Redeploy</b> sur une VM ?", a:"Déplacer la VM vers un autre hôte Azure."},
  {d:"com", q:"Contrainte pour <b>resize</b> une VM ?", a:"Éteindre la VM si on change de famille matérielle."},
  {d:"com", q:"Exécuter un script au démarrage d'une VM ?", a:"Custom Script Extension (ou cloud-init sous Linux)."},
  {d:"com", q:"Déployer un template ARM dans un RG (PowerShell) ?", a:"<code>New-AzResourceGroupDeployment</code>."},
  {d:"com", q:"Créer une VM sans template (PowerShell) ?", a:"<code>New-AzVM</code>."},
  {d:"com", q:"<code>-TemplateFile</code> vs <code>-TemplateUri</code> ?", a:"TemplateFile = template local. TemplateUri = template dans Blob / GitHub / URL."},
  {d:"com", q:"Qu'est-ce que <b>Bicep</b> ?", a:"Langage IaC moderne qui transpile en ARM JSON (<code>az deployment group create -f main.bicep</code>)."},
  {d:"com", q:"Qu'est-ce qu'un <b>deployment stack</b> ?", a:"Gérer un ensemble de ressources comme une seule unité (cycle de vie groupé)."},
  {d:"com", q:"Les restart policies d'<b>ACI</b> ?", a:"Always, OnFailure, Never."},
  {d:"com", q:"Qu'est-ce qu'<b>ACR</b> ?", a:"Registre d'images de conteneurs privé. Geo-replication en Premium ; ACR Tasks."},
  {d:"com", q:"Limiter l'accès au serveur API <b>AKS</b> ?", a:"Authorized IP ranges ou private cluster."},
  {d:"com", q:"Qu'est-ce qu'<b>Azure Container Apps</b> ?", a:"Conteneurs serverless (scale-to-zero, KEDA)."},

  {d:"net", q:"Les plages d'adresses privées (RFC 1918) ?", a:"<code>10.0.0.0/8</code>, <code>172.16.0.0/12</code>, <code>192.168.0.0/16</code>."},

  {d:"pie", q:"Piège 11 · Disques de données : <code>D4s_v3</code> vs <code>D2s_v3</code> ?", a:"D4s_v3 = 8 disques de données, D2s_v3 = 4 (règle Dsv3 ≈ 2 × vCPU). Le max de disques dépend de la TAILLE de la VM."},
  {d:"pie", q:"Piège 13 · Alerter sur une recommandation <b>Azure Advisor</b> : quel type de règle ?", a:"<b>Activity Log alert</b> (Advisor passe par l'Activity Log). Métriques / logs classiques = alert rules Azure Monitor."},

  {d:"pie", q:"Piège 17 · <b>Object Replication</b> : qui génère les changements, et quel prérequis ?", a:"Seule la SOURCE génère les changements, mais le <b>versioning</b> doit être activé sur les DEUX comptes."},
  {d:"pie", q:"Piège 18 · Limites de notification des alertes (Action Group) ?", a:"Email : <b>100 / heure</b>. SMS et vocal : <b>1 toutes les 5 min</b> (≈ 12 / heure)."},
  {d:"pie", q:"Piège 19 · ASR entre région A et région B (aller-retour) : combien de vaults ?", a:"Minimum 2 — un par région : le vault doit être dans une région différente des VM sources qu'il protège."},
  {d:"pie", q:"Piège 20 · Un Load Balancer <b>Standard</b> peut-il servir plusieurs subnets d'un VNet ?", a:"Oui — le backend pool du SKU Standard peut couvrir plusieurs subnets du même VNet."},
  {d:"pie", q:"Piège 21 · Availability <b>Set</b> vs <b>Zone</b> : lequel est une ressource à créer ?", a:"Set = objet logique à CRÉER dans un RG (fault/update domains, même datacenter). Zone = PAS une ressource : option d'emplacement physique choisie à la création de la VM."},
  {d:"pie", q:"Piège 22 · Swap de slots App Service : que deviennent app settings et connection strings ?", a:"Par défaut ils SUIVENT le code (échangés). Parade : cocher <b>« Deployment slot setting »</b> pour les rendre sticky — la config reste collée à son slot d'origine."},
  {d:"pie", q:"Piège 23 · Masques minimum : Bastion / Firewall / Passerelle VPN ?", a:"Azure Bastion <code>/26</code> · Azure Firewall <code>/26</code> · Passerelle VPN <code>/27</code>."},

  {d:"pie", q:"Piège 25 · Noms de subnets imposés : Bastion / VPN / Firewall ?", a:"<code>AzureBastionSubnet</code> · <code>GatewaySubnet</code> · <code>AzureFirewallSubnet</code> (orthographe exacte)."},
  {d:"pie", q:"Piège 26 · Peering A–B et B–C : comment A joint-il C via la gateway de B ?", a:"Sur B (le hub) : <b>Allow gateway transit</b>. Sur A et C (les spokes) : <b>Use remote gateway</b>. (Le peering seul n'est jamais transitif.)"},
  {d:"pie", q:"Piège 27 · GRS vs Object Replication : qui choisit la région de destination ?", a:"GRS = région appariée IMPOSÉE par Microsoft. Object Replication = destination AU CHOIX + versioning obligatoire + Blobs uniquement (GPv2 / premium block blob)."},
  {d:"pie", q:"Piège 28 · Trafic arrivant par VPN / ExpressRoute : quel répartiteur ?", a:"IP privée → <b>Load Balancer interne</b> ou Application Gateway (frontend privé). Traffic Manager et Front Door = Internet uniquement !"},
  {d:"pie", q:"Piège 29 · Appareil Entra ID <b>Joined</b> vs <b>Registered</b> ?", a:"Joined = appareil d'ENTREPRISE (l'IT exige le contrôle total). Registered = BYOD perso (l'employé garde le contrôle de sa machine)."},
  {d:"pie", q:"Piège 30 · UDR qui route le trafic vers une <b>NVA</b> : que faut-il activer sur la VM NVA ?", a:"<b>IP forwarding</b> sur sa carte réseau (NIC)."},
  {d:"pie", q:"Piège 31 · <b>DCR</b> vs <b>Diagnostic settings</b> ?", a:"DCR (Data Collection Rule) = l'INTÉRIEUR de la VM (OS invité, agent AMA requis). Diagnostic settings = l'EXTÉRIEUR (plateforme Azure)."},

  // ===== Global vs Régional =====
  {d:"geo", q:"Les 4 services <b>globaux</b> (pas liés à une région) ?", a:"Microsoft Entra ID · Azure DNS · Traffic Manager · Azure Front Door."},
  {d:"geo", q:"Ressources <b>régionales</b> mais utilisables PAR d'autres régions ?", a:"Log Analytics Workspace, Recovery Services Vault, Backup Vault, Key Vault, ACR, Automation Account, Storage Account."},
  {d:"geo", q:"Ressources <b>fortement liées</b> à leur région ?", a:"VM, VNet, Subnet, NIC, NSG, ASG, Public IP, Load Balancer, Application Gateway."},

  // ===== Astuces exam =====
  {d:"tip", q:"Déclencheur : « granular access »", a:"→ ACL / scope RBAC fin."},
  {d:"tip", q:"Déclencheur : « cheap VM »", a:"→ Spot VM."},
  {d:"tip", q:"Déclencheur : « autoscale web app »", a:"→ App Service Plan (Standard+)."},
  {d:"tip", q:"Déclencheur : « private access to PaaS »", a:"→ Private Endpoint."},
  {d:"tip", q:"Déclencheur : « on-prem connection »", a:"→ VPN Gateway."},
  {d:"tip", q:"Déclencheur : « backup central »", a:"→ Recovery Services Vault."},
  {d:"tip", q:"Déclencheur : « le LB ne marche pas »", a:"→ vérifier rule + probe + SKU."},
  {d:"tip", q:"Déclencheur : « IP Standard ne répond pas »", a:"→ ouvrir le NSG."},
  {d:"tip", q:"Déclencheur : « relier 2 VNets »", a:"→ VNet Peering."},
  {d:"tip", q:"Déclencheur : « accès VM sans IP publique »", a:"→ Azure Bastion."},
  {d:"tip", q:"Déclencheur : « HA contre panne datacenter »", a:"→ Availability Zones."},
  {d:"tip", q:"Déclencheur : « forcer / appliquer une conformité »", a:"→ Azure Policy."},
  {d:"tip", q:"Déclencheur : « DR entre régions »", a:"→ Azure Site Recovery (ASR)."},
];
CARDS.forEach((c,i)=>c.id=i);

/* ---------- État ---------- */
let baseOrder = CARDS.map(c=>c.id);
let filter = "all";
let reviewOnly = false;
let pos = 0;
let flipped = false;
const status = {}; // id -> 'known' | 'review'

/* ---------- Persistance (localStorage, clé = texte de la question) ---------- */
const LS_KEY = "az104-progress-v1";
function saveStatus(){
  try{
    const m = {};
    for(const id in status){ m[CARDS[id].q] = status[id]; }
    localStorage.setItem(LS_KEY, JSON.stringify(m));
  }catch(e){ /* stockage indisponible : progression session uniquement */ }
}
function loadStatus(){
  try{
    const m = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
    CARDS.forEach(c => { if(m[c.q]) status[c.id] = m[c.q]; });
  }catch(e){}
}

/* ---------- Helpers ---------- */
const $ = s => document.querySelector(s);
const card = $("#card");

function matches(id){
  const c = CARDS[id];
  if(filter!=="all" && c.d!==filter) return false;
  if(reviewOnly && status[id]!=="review") return false;
  return true;
}
function active(){ return baseOrder.filter(matches); }

function setAccent(domKey){
  const col = DOMAINS[domKey] ? DOMAINS[domKey].color : "var(--net)";
  document.documentElement.style.setProperty("--accent", col);
  card.style.setProperty("--accent", col);
}

/* ---------- Rendu ---------- */
function renderFilters(){
  const box = $("#filters");
  box.innerHTML = "";
  const mk = (key,label,color) => {
    const el = document.createElement("div");
    el.className = "chip" + (filter===key ? " active":"");
    el.innerHTML = (color?`<span class="dot" style="background:${color}"></span>`:"") + label;
    el.onclick = () => { filter = key; pos = 0; flipped=false; render(); };
    return el;
  };
  box.appendChild(mk("all","Tout",""));
  Object.keys(DOMAINS).forEach(k=>box.appendChild(mk(k,DOMAINS[k].short,DOMAINS[k].color)));

  const rt = document.createElement("div");
  rt.className = "chip review-toggle" + (reviewOnly?" active":"");
  const rvCount = Object.values(status).filter(s=>s==="review").length;
  rt.innerHTML = "★ À revoir" + (rvCount?` (${rvCount})`:"");
  rt.onclick = () => { reviewOnly = !reviewOnly; pos = 0; flipped=false; render(); };
  box.appendChild(rt);
}

function render(){
  renderFilters();
  const list = active();
  const total = list.length;
  const knownN = Object.values(status).filter(s=>s==="known").length;
  const reviewN = Object.values(status).filter(s=>s==="review").length;

  // stats
  $("#stats").innerHTML =
    `<span class="k">carte ${total? (pos+1):0} / ${total}</span><br>`+
    `<span class="ok">su ${knownN}</span> · <span class="rv">à revoir ${reviewN}</span>`;

  const hasCards = total>0;
  card.style.display = hasCards ? "" : "none";
  $("#nav").style.display = hasCards ? "" : "none";
  $("#actions").style.display = hasCards ? "" : "none";
  $("#empty").style.display = hasCards ? "none" : "";

  if(!hasCards){
    $("#empty").innerHTML = reviewOnly
      ? "<b>Aucune carte « à revoir ».</b><br>Marque des cartes avec « À revoir »,<br>ou désactive le filtre."
      : "<b>Aucune carte dans ce filtre.</b>";
    $("#railFill").style.width = "0%";
    return;
  }

  if(pos>=total) pos = total-1;
  if(pos<0) pos = 0;

  const id = list[pos];
  const c = CARDS[id];
  const dom = DOMAINS[c.d];
  setAccent(c.d);

  // flip state
  card.classList.toggle("flipped", flipped);
  $("#flip").textContent = flipped ? "Question" : "Retourner";

  // content
  const eyebrow = `${dom.short} <span class="num">· ${pos+1}/${total}</span>`;
  $("#feyebrow").innerHTML = eyebrow;
  $("#beyebrow").innerHTML = eyebrow;
  $("#qtext").innerHTML = c.q;
  $("#atext").innerHTML = c.a;

  // flags
  const st = status[id];
  const flagTxt = st==="known" ? "Su" : st==="review" ? "À revoir" : "";
  const flagCls = "flag" + (st?` ${st}`:"");
  ["#fflag","#bflag"].forEach(sel=>{
    const el = $(sel);
    el.textContent = flagTxt;
    el.className = flagCls;
    el.style.display = st ? "" : "none";
  });

  // rail
  $("#railFill").style.width = ((pos+1)/total*100) + "%";
}

/* ---------- Actions ---------- */
function flip(){ flipped = !flipped; render(); }
function go(delta){
  const total = active().length; if(!total) return;
  pos = (pos + delta + total) % total;
  flipped = false; render();
}
function mark(state){
  const list = active(); if(!list.length) return;
  const id = list[pos];
  status[id] = (status[id]===state) ? undefined : state;
  if(status[id]===undefined) delete status[id];
  saveStatus();
  // avancer si on vient de trancher
  if(status[id]){ setTimeout(()=>go(1), 120); } else { render(); }
}
function shuffle(){
  for(let i=baseOrder.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [baseOrder[i],baseOrder[j]] = [baseOrder[j],baseOrder[i]];
  }
  pos = 0; flipped = false; render();
}
function reset(){
  for(const k in status) delete status[k];
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  reviewOnly = false; filter = "all"; pos = 0; flipped = false;
  baseOrder = CARDS.map(c=>c.id);
  render();
}

/* ---------- Écouteurs ---------- */
card.addEventListener("click", flip);
card.addEventListener("keydown", e=>{ if(e.key==="Enter"){e.preventDefault();flip();} });
$("#flip").addEventListener("click", e=>{ e.stopPropagation(); flip(); });
$("#prev").addEventListener("click", ()=>go(-1));
$("#next").addEventListener("click", ()=>go(1));
$("#markRev").addEventListener("click", ()=>mark("review"));
$("#markKnow").addEventListener("click", ()=>mark("known"));
$("#shuffle").addEventListener("click", shuffle);
$("#reset").addEventListener("click", reset);

document.addEventListener("keydown", e=>{
  if(e.target.tagName==="INPUT") return;
  switch(e.key){
    case " ": e.preventDefault(); flip(); break;
    case "ArrowRight": go(1); break;
    case "ArrowLeft": go(-1); break;
    case "j": case "J": mark("known"); break;
    case "r": case "R": mark("review"); break;
    case "s": case "S": shuffle(); break;
  }
});

// swipe mobile
let tx=0, ty=0;
card.addEventListener("touchstart", e=>{ tx=e.changedTouches[0].clientX; ty=e.changedTouches[0].clientY; }, {passive:true});
card.addEventListener("touchend", e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)){ go(dx<0?1:-1); }
}, {passive:true});

loadStatus();
render();
$("#foot").innerHTML = CARDS.length + " cartes · pièges d'examen & astuces inclus<br>Progression sauvegardée sur cet appareil.<br><a href=\"index.html\" style=\"color:var(--muted-2)\">À propos, code source & contributions</a>";
</script>
<script>
if("serviceWorker" in navigator){ addEventListener("load", ()=>navigator.serviceWorker.register("sw.js")); }
</script>
